name: Release

on:
  push:
    tags:
      - "*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Set up Git LFS
        run: |
          git lfs install
          git lfs pull

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install qgis-plugin-ci
        run: pip install qgis-plugin-ci

      - name: Generate release notes
        id: release_notes
        env:
          CURRENT_TAG: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          NOTES_FILE="$RUNNER_TEMP/release-notes.md"
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 "${CURRENT_TAG}^" 2>/dev/null || true)

          if [ -n "$PREVIOUS_TAG" ]; then
            {
              echo "## Changes since $PREVIOUS_TAG"
              echo
              git log --date-order \
                --format="- %s ([%h](https://github.com/${REPOSITORY}/commit/%H))" \
                "${PREVIOUS_TAG}..${CURRENT_TAG}"
              echo
              echo "**Full changelog:** https://github.com/${REPOSITORY}/compare/${PREVIOUS_TAG}...${CURRENT_TAG}"
            } > "$NOTES_FILE"
          else
            {
              echo "## Changes"
              echo
              git log --date-order \
                --format="- %s ([%h](https://github.com/${REPOSITORY}/commit/%H))" \
                "$CURRENT_TAG"
            } > "$NOTES_FILE"
          fi

          echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          CURRENT_TAG: ${{ github.ref_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOTES_FILE: ${{ steps.release_notes.outputs.notes_file }}
        run: gh release create "$CURRENT_TAG" --title "$CURRENT_TAG" --notes-file "$NOTES_FILE" --verify-tag

      - name: Package and release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OSGEO_USERNAME: ${{ secrets.OSGEO_USERNAME }}
          OSGEO_PASSWORD: ${{ secrets.OSGEO_PASSWORD }}
        run: |
          ARGS="--github-token $GITHUB_TOKEN"

          if [ -n "$OSGEO_USERNAME" ] && [ -n "$OSGEO_PASSWORD" ]; then
            ARGS="$ARGS --osgeo-username $OSGEO_USERNAME --osgeo-password $OSGEO_PASSWORD"
          fi

          qgis-plugin-ci release ${{ github.ref_name }} $ARGS
